<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MN AGO Entropy Ledger</title>
</head>
<body>
  <h1>MN AGO Entropy Ledger</h1>

  <h2>Latest CID</h2>
  <pre id="cid">loading...</pre>

  <h2>Diff State</h2>
  <pre id="diff">loading...</pre>

  <h2>Clock</h2>
  <pre id="clock">loading...</pre>

  <script>
    async function load() {
      try {
        const cid = await fetch("./latest.json").then(r => r.json());
        document.getElementById("cid").textContent = JSON.stringify(cid, null, 2);
      } catch (e) {
        document.getElementById("cid").textContent = "error loading CID";
      }

      try {
        const diff = await fetch("./diff.json").then(r => r.json());
        document.getElementById("diff").textContent = JSON.stringify(diff, null, 2);
      } catch (e) {
        document.getElementById("diff").textContent = "error loading diff";
      }

      try {
        const clock = await fetch("./clock.json").then(r => r.json());
        document.getElementById("clock").textContent = JSON.stringify(clock, null, 2);
      } catch (e) {
        document.getElementById("clock").textContent = "error loading clock";
      }
    }

    load();
  </script>
</body>
</html>

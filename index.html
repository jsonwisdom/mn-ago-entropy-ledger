<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MN AGO Entropy Ledger</title>

<style>
body { font-family: Arial; padding:20px; background:#f5f5f5; }
.card { background:#fff; padding:16px; border-radius:10px; margin:16px 0; }
.big { font-size:42px; font-weight:bold; }
a { word-break: break-all; }

.change {
  border:1px solid #ddd;
  border-radius:10px;
  padding:12px;
  margin-bottom:12px;
  background:#fafafa;
}
.label { font-size:12px; color:#666; font-weight:bold; }
.value { font-size:15px; margin-bottom:8px; word-break:break-word; }
</style>
</head>

<body>

<h1>MN AGO Entropy Ledger v1</h1>
<p>Public accountability layer — timestamp, hash, compare</p>

<div class="card">
<div>Explainability Index</div>
<div id="score" class="big">0.00</div>
</div>

<div class="card">
<div>Latest IPFS CID</div>
<div id="cid">Loading...</div>
</div>

<div class="card">
<div>Recent Changes</div>
<div id="rows"></div>
</div>

<script>
async function run() {
  try {

    const diff = await fetch("./site/diff.json?x=" + Date.now());
    const data = await diff.json();
    const rows = data.data || [];

    document.getElementById("score").innerText = (rows.length / 4).toFixed(2);

    const container = document.getElementById("rows");
    container.innerHTML = "";

    rows.forEach(r => {
      const url = r.source_url || r.url || "";

      const div = document.createElement("div");
      div.className = "change";

      div.innerHTML = `
        <div class="label">Time</div>
        <div class="value">${r.time || ""}</div>

        <div class="label">Page</div>
        <div class="value">${url}</div>

        <div class="label">State</div>
        <div class="value">${r.state || ""}</div>

        <div class="label">Link</div>
        <div class="value">
          <a href="${url}" target="_blank">open</a>
        </div>
      `;

      container.appendChild(div);
    });

    const latest = await fetch("./site/latest.json?x=" + Date.now());
    const latestData = await latest.json();
    const cid = latestData.cid || "";

    document.getElementById("cid").innerHTML =
      `<a href="https://ipfs.io/ipfs/${cid}" target="_blank">${cid}</a>`;

  } catch (e) {
    document.getElementById("cid").innerText = "FAILED";
  }
}

run();
</script>

</body>
</html>

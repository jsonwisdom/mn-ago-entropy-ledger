<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MN AGO Entropy Ledger</title>

<style>
body { font-family: Arial; padding: 20px; background:#f5f5f5; }
.card { background:#fff; padding:16px; border-radius:10px; margin:16px 0; }
.big { font-size:42px; font-weight:bold; }
table { width:100%; border-collapse:collapse; }
td, th { padding:8px; border-bottom:1px solid #ddd; font-size:14px; }
a { word-break: break-all; }
</style>
</head>

<body>

<h1>MN AGO Entropy Ledger v1</h1>
<p>Public accountability layer — timestamp, hash, compare</p>

<div class="card">
<div>Explainability Index</div>
<div id="score" class="big">0.00</div>
</div>

<div class="card">
<div>Latest IPFS CID</div>
<div id="cid">Loading...</div>
</div>

<div class="card">
<div>Recent Changes</div>
<table>
<thead>
<tr>
<th>Time</th>
<th>Page</th>
<th>State</th>
<th>Link</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>
</div>

<script>
async function run() {
  try {

    // LOAD DIFF
    const diff = await fetch("./site/diff.json?nocache=" + Date.now());
    const diffData = await diff.json();
    const rows = diffData.data || [];

    // SCORE
    document.getElementById("score").textContent = (rows.length / 4).toFixed(2);

    // TABLE
    const table = document.getElementById("rows");
    table.innerHTML = "";

    rows.forEach(r => {

      // 🔥 CRITICAL FIX: support BOTH field names
      const url = r.source_url || r.url || "";

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${r.time || ""}</td>
        <td>${url}</td>
        <td>${r.state || ""}</td>
        <td><a href="${url}" target="_blank">open</a></td>
      `;
      table.appendChild(tr);
    });

    // LOAD CID
    const latest = await fetch("./site/latest.json?nocache=" + Date.now());
    const latestData = await latest.json();

    const cid = latestData.cid || "";
    document.getElementById("cid").innerHTML =
      `<a href="https://ipfs.io/ipfs/${cid}" target="_blank">${cid}</a>`;

  } catch (e) {
    document.getElementById("cid").innerText = "FAILED";
  }
}

run();
</script>

</body>
</html>

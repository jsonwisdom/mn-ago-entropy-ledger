<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Global Truth OS</title>
<style>
body{font-family:monospace;background:#000;color:#0f0;padding:20px}
.card{border:1px solid #0f0;padding:10px;margin:10px}
.red{color:#ff4444}.yellow{color:#ffff44}.green{color:#44ff44}
button{background:#000;border:1px solid #0f0;color:#0f0;padding:6px;margin-top:8px;cursor:pointer}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);color:#0f0;padding:20px;overflow:auto}
</style>
</head>
<body>
<h1>GLOBAL TRUTH OS ⚙️</h1>
<div id="stats"></div>
<div id="claims"></div>
<div id="modal" class="modal" onclick="this.style.display='none'"></div>
<script>
let claims=[];let receipts=[];
function showReceipts(id){
 let r=receipts.filter(x=>x.claim_id===id);
 let html='<h2>Receipts</h2>';
 r.forEach(x=>{
  html+=`<div><b>${x.source.label}</b><br><a href="${x.source.url}" target="_blank">${x.source.url}</a><br>TYPE:${x.type}</div><hr>`;
 });
 let m=document.getElementById('modal');
 m.innerHTML=html;m.style.display='block';
}
Promise.all([
 fetch('../truth/claims.json').then(r=>r.json()),
 fetch('../truth/receipts.json').then(r=>r.json())
]).then(([cData,rData])=>{
 claims=cData;receipts=rData;
 let red=0,yellow=0,green=0;
 claims.forEach(c=>{
  if(c.tri_state==='RED') red++;
  if(c.tri_state==='YELLOW') yellow++;
  if(c.tri_state==='GREEN') green++;
 });
 let total=claims.length;
 document.getElementById('stats').innerHTML=`TOTAL:${total} | RED:${red} | YELLOW:${yellow} | GREEN:${green}`;
 let html='';
 claims.forEach(c=>{
  html+=`<div class="card ${c.tri_state.toLowerCase()}">
  <b>${c.claim_id}</b><br>
  ${c.title}<br>
  STATE:${c.tri_state}<br>
  <button onclick="showReceipts('${c.claim_id}')">View Receipts</button>
  </div>`;
 });
 document.getElementById('claims').innerHTML=html;
});
</script>
</body>
</html>

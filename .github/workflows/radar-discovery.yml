name: Radar Discovery

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  radar:
    runs-on: ubuntu-latest

    steps:
      - name: Discover same-origin URLs from trusted seeds
        run: |
          python3 - <<'PY'
          from html.parser import HTMLParser
          from urllib.parse import urljoin, urlparse
          from urllib.request import Request, urlopen
          from datetime import datetime, timezone

          SEEDS = [
              "https://www.ag.state.mn.us/consumer/",
              "https://www.ag.state.mn.us/Data-Requests/",
              "https://www.ag.state.mn.us/consumer/scams/",
              "https://www.ag.state.mn.us/Office/Communications.asp",
          ]

          ALLOWED_HOST = "www.ag.state.mn.us"

          class LinkParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.links = []

              def handle_starttag(self, tag, attrs):
                  if tag.lower() != "a":
                      return
                  for key, value in attrs:
                      if key.lower() == "href" and value:
                          self.links.append(value)

          def fetch(url: str) -> str:
              req = Request(url, headers={"User-Agent": "Mozilla/5.0"})
              with urlopen(req, timeout=20) as resp:
                  return resp.read().decode("utf-8", errors="ignore")

          discovered = set()

          print("RADAR DISCOVERY START")
          print(f"UTC: {datetime.now(timezone.utc).isoformat()}")

          for seed in SEEDS:
              print(f"\nSOURCE: {seed}")
              html = fetch(seed)
              parser = LinkParser()
              parser.feed(html)

              for raw_link in parser.links:
                  absolute = urljoin(seed, raw_link)
                  parsed = urlparse(absolute)

                  if parsed.scheme not in ("http", "https"):
                      continue
                  if parsed.netloc != ALLOWED_HOST:
                      continue

                  normalized = f"{parsed.scheme}://{parsed.netloc}{parsed.path}"
                  discovered.add(normalized)

          print("\nDISCOVERED URLS")
          for url in sorted(discovered):
              print(url)

          print(f"\nTOTAL_DISCOVERED={len(discovered)}")
          print("RADAR DISCOVERY END")
          PY

name: pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - run: python scripts/validate_chain.py

      - name: pin to ipfs
        id: pin
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: |
          CID=$(python scripts/pin_to_ipfs.py | awk '/CID:/ {print $2}')
          echo "cid=$CID" >> "$GITHUB_OUTPUT"

      - name: write cid
        env:
          CID: ${{ steps.pin.outputs.cid }}
        run: python scripts/save_cid.py

      - name: clock
        run: python scripts/clock.py

      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/latest.json site/clock.json
          git commit -m "update site" || echo "no changes"
          git push

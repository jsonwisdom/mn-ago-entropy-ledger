name: pipeline

on:
  push:
    branches:
      - main

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - run: python scripts/validate_chain.py

      - name: pin to ipfs
        id: pin
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: |
          CID=$(python scripts/pin_to_ipfs.py | awk '/CID:/ {print $2}')
          echo "cid=$CID" >> "$GITHUB_OUTPUT"

      - name: write cid
        run: |
          echo "{\"cid\":\"${{ steps.pin.outputs.cid }}\"}" > site/latest.json

      - name: clock
        run: python scripts/clock.py

      - name: commit
        run: |
          git config user.name "bot"
          git config user.email "bot@local"
          git add site/latest.json site/clock.json
          git commit -m "update site" || echo "no changes"
          git push

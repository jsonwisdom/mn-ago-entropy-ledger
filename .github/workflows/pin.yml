name: Build + Deploy Site

on:
  schedule:
    - cron: "*/10 * * * *"
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests

      - name: Run core system
        run: |
          python3 scripts/clock.py
          python3 scripts/diff.py

      # 🚨 RADAR DRY RUN (NO FILE WRITES)
      - name: Radar Dry Run
        run: |
          echo "RADAR DRY RUN START"
          python3 - << 'EOF'
import requests, re

URLS = [
    "https://www.ag.state.mn.us/consumer/",
    "https://www.ag.state.mn.us/Data-Requests/",
    "https://www.ag.state.mn.us/consumer/scams/",
    "https://www.ag.state.mn.us/Office/Communications.asp"
]

seen = set()

for url in URLS:
    try:
        r = requests.get(url, timeout=10)
        links = re.findall(r'href=[\'"]?([^\'" >]+)', r.text)
        for link in links:
            if link.startswith("http") and "ag.state.mn.us" in link:
                if link not in seen:
                    seen.add(link)
                    print(f"DISCOVERED: {link}")
    except Exception as e:
        print(f"ERROR: {url} -> {e}")

print("RADAR DRY RUN END")
EOF

      - name: Copy site to root
        run: |
          cp -r site/* .

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "auto update site [skip ci]"
          git push

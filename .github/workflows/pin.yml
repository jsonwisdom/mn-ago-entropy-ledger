name: Validate + Pin + Clock

on:
  push:
    branches: [ main ]

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Run validator
        run: python scripts/validate_chain.py

      - name: Pin ledger to IPFS
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: python scripts/pin_to_ipfs.py

      - name: Save CID to site
        run: python scripts/save_cid.py

      - name: Run clock
        run: python scripts/clock.py

      - name: Commit updates
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add site/latest.json site/clock.json
          git commit -m "update cid + clock" || echo "no changes"
          git push

name: pipeline

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write   # 🔥 THIS IS THE FIX

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Run diff detection
        run: python scripts/diff.py

      - name: Validate chain
        run: python scripts/validate_chain.py

      - name: Update response clock
        run: python scripts/clock.py

      - name: Commit ledger updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add .
          git commit -m "auto update" || echo "no changes"
          git push

      - name: Pin to IPFS
        run: python scripts/pin_to_ipfs.py

      - name: Write CID
        run: python scripts/save_cid.py

      - name: Update site/latest.json
        run: echo "updated"

      - name: Commit site update
        run: |
          git add .
          git commit -m "update site" || echo "no changes"
          git push

name: pipeline

on:
  push:
    branches: [ main ]

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - run: python scripts/validate_chain.py

      - name: pin to ipfs
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: python scripts/pin_to_ipfs.py

      - name: write cid
        run: python scripts/save_cid.py

      - name: clock
        run: python scripts/clock.py

      - name: commit
        run: |
          git config user.name "bot"
          git config user.email "bot@local"
          git add site/
          git commit -m "update site" || echo "no changes"
          git push

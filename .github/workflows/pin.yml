name: build

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: Run diff detection
        run: python scripts/diff.py

      - - name: Validate chain (non-blocking)
  run: python scripts/validate_chain.py || echo "chain validation skipped"
      - name: Update response clock
        run: python scripts/clock.py

      - name: Commit ledger updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add ledger/ ledger.jsonl site/diff.json site/clock.json || true
          git commit -m "auto update ledger" || echo "no changes"
          git push

      - name: Pin to IPFS
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: python scripts/pin_to_ipfs.py

      - name: Write CID
        env:
          CID: ${{ steps.pin.outputs.cid }}
        run: python scripts/save_cid.py || echo "skip cid write"

      - name: Update site/latest.json
        run: echo "site latest handled"

      - name: Commit site update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add site/latest.json
          git commit -m "update site cid" || echo "no changes"
          git push

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MN AGO Entropy Ledger</title>
</head>
<body>
  <h1>MN AGO Entropy Ledger</h1>
  <p>Status: LIVE</p>
  <p>Validation: Automated via GitHub Actions</p>

  <h2>Latest CID</h2>
  <p id="cid">Loading...</p>

  <h2>Ledger Data</h2>
  <div id="data">Loading...</div>

  <script>
    fetch('latest.json')
      .then(r => r.json())
      .then(d => {
        const cid = d.cid;
        const url = "https://ipfs.io/ipfs/" + cid;
        document.getElementById('cid').innerHTML =
          '<a href="' + url + '" target="_blank">' + cid + '</a>';
      })
      .catch(() => {
        document.getElementById('cid').innerText = 'CID unavailable';
      });

    fetch('../ledger/ledger.jsonl')
      .then(r => r.text())
      .then(t => {
        const lines = t.trim().split('\n').filter(Boolean);
        const formatted = lines.map(l => {
          const obj = JSON.parse(l);
          const receipt = obj.receipt_id || 'No receipt_id';
          const type = obj.type || '';
          const sourceUrl = obj.source_url || '';
          const seen = obj.first_seen_utc || '';

          return `
            <div style="margin-bottom:15px;padding:10px;border:1px solid #ccc;">
              <strong>${receipt}</strong><br>
              Type: ${type}<br>
              URL: <a href="${sourceUrl}" target="_blank">${sourceUrl}</a><br>
              Seen: ${seen}
            </div>
          `;
        }).join('');

        document.getElementById('data').innerHTML =
          formatted || 'No ledger data found';
      })
      .catch(() => {
        document.getElementById('data').innerText =
          'Could not load ledger data';
      });
  </script>
</body>
</html>

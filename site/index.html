<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MN AGO Entropy Ledger</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .card { border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; border-radius: 10px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 8px; border-bottom: 1px solid #ccc; text-align: left; }
  </style>
</head>
<body>

<h1>MN AGO Entropy Ledger v1</h1>
<p>Public accountability layer — timestamp, hash, compare</p>

<div class="card">
  <h2>Explainability Index</h2>
  <div id="index">Loading...</div>
</div>

<div class="card">
  <h2>Latest IPFS CID</h2>
  <div id="cid">Loading...</div>
</div>

<div class="card">
  <h2>Recent Changes</h2>
  <table id="table">
    <thead>
      <tr><th>Time</th><th>Page</th><th>State</th><th>Link</th></tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
async function load() {
  try {
    const diff = await fetch('./diff.json').then(r => r.json());
    const latest = await fetch('./latest.json').then(r => r.json());

    // Explainability
    document.getElementById('index').innerText =
      diff.length > 0 ? "1.00 (" + diff.length + " signals)" : "0.00";

    // CID
    document.getElementById('cid').innerHTML =
      latest.cid ? `<a href="https://ipfs.io/ipfs/${latest.cid}">${latest.cid}</a>` : "None";

    // Table
    const tbody = document.querySelector('#table tbody');
    tbody.innerHTML = "";

    diff.forEach(row => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${row.time}</td>
        <td>${row.page}</td>
        <td>${row.state}</td>
        <td><a href="${row.link}" target="_blank">open</a></td>
      `;
      tbody.appendChild(tr);
    });

  } catch (e) {
    console.error(e);
  }
}

load();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>MN AGO Entropy Ledger</title>
</head>
<body>

<h1>MN AGO Entropy Ledger v1</h1>
<p>Public accountability layer — timestamp, hash, compare</p>

<h2>Explainability Index</h2>
<div id="score">0.00</div>

<h2>Latest IPFS CID</h2>
<div id="cid"></div>

<h2>Recent Changes</h2>
<table border="1">
  <thead>
    <tr>
      <th>Time</th>
      <th>Page</th>
      <th>State</th>
      <th>Link</th>
    </tr>
  </thead>
  <tbody id="rows"></tbody>
</table>

<script>
async function load() {
  // load CID
  const latest = await fetch("site/latest.json").then(r => r.json());
  document.getElementById("cid").innerHTML =
    `<a href="https://ipfs.io/ipfs/${latest.cid}" target="_blank">${latest.cid}</a>`;

  // load diff
  const diff = await fetch("site/diff.json").then(r => r.json());

  const rows = diff.data || [];   // 🔥 FIX

  const tbody = document.getElementById("rows");

  rows.forEach(r => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${r.time || ""}</td>
      <td>${r.source_url}</td>
      <td>${r.state}</td>
      <td><a href="${r.source_url}" target="_blank">open</a></td>
    `;
    tbody.appendChild(tr);
  });

  // explainability
  const score = rows.length / 4;
  document.getElementById("score").innerText = score.toFixed(2);
}

load();
</script>

</body>
</html>

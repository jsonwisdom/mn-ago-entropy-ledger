<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MN AGO Entropy Ledger</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 24px; background: #f5f5f5; color: #111; }
    h1 { margin: 0 0 12px 0; font-size: 48px; line-height: 1.05; }
    p { margin: 0 0 20px 0; font-size: 18px; color: #444; }
    .card { background: white; border: 1px solid #ddd; border-radius: 12px; padding: 20px; margin: 20px 0; }
    .label { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
    .big { font-size: 48px; font-weight: 700; }
    table { width: 100%; border-collapse: collapse; font-size: 16px; }
    th, td { padding: 10px 8px; border-bottom: 1px solid #ddd; text-align: left; vertical-align: top; }
    a { color: #0b57d0; word-break: break-all; }
    .muted { color: #666; }
  </style>
</head>
<body>
  <h1>MN AGO Entropy Ledger v1</h1>
  <p>Public accountability layer — timestamp, hash, compare</p>

  <div class="card">
    <div class="label">Explainability Index</div>
    <div id="score" class="big">0.00</div>
  </div>

  <div class="card">
    <div class="label">Latest IPFS CID</div>
    <div id="cid" class="muted">Loading...</div>
  </div>

  <div class="card">
    <div class="label">Recent Changes</div>
    <table>
      <thead>
        <tr>
          <th>Time</th>
          <th>Page</th>
          <th>State</th>
          <th>Link</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>

  <script>
    async function loadSite() {
      try {
        const diffRes = await fetch('./diff.json', { cache: 'no-store' });
        const diffObj = await diffRes.json();
        const rows = Array.isArray(diffObj.data) ? diffObj.data : [];

        document.getElementById('score').textContent = (rows.length / 4).toFixed(2);

        const tbody = document.getElementById('rows');
        tbody.innerHTML = '';

        rows.forEach((r) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${r.time || ''}</td>
            <td>${r.source_url || ''}</td>
            <td>${r.state || ''}</td>
            <td><a href="${r.source_url || '#'}" target="_blank">open</a></td>
          `;
          tbody.appendChild(tr);
        });

        const latestRes = await fetch('./latest.json', { cache: 'no-store' });
        const latestObj = await latestRes.json();
        const cid = latestObj.cid || latestObj.CID || '';

        document.getElementById('cid').innerHTML = cid
          ? `<a href="https://ipfs.io/ipfs/${cid}" target="_blank">${cid}</a>`
          : 'No CID found';
      } catch (err) {
        document.getElementById('cid').textContent = 'Failed to load site data';
      }
    }

    loadSite();
  </script>
</body>
</html>
